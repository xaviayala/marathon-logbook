<!DOCTYPE html>
<html>
<head>
  <title>Pain-Free Sub-1:30 Half & Sub-3:15 Marathon Journey</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">🏃 Loading training data...</div>

  <script>
    window.$docsify = {
      name: 'Sub-1:15 & Sub-3:15 Logbook',
      repo: 'xaviayala/marathon-logbook',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,

      // 👇 This loads the ROOT README
      homepage: '../README.md',

      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      // 2. CONFIGURE COLLAPSE LEVEL
      sidebarDisplayLevel: 1, // 0 = all collapsed, 1 = top level shown
      subMaxLevel: 2
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
